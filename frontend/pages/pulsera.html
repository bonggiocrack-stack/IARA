<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Producto — La Llave del Amor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />

  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
  <div class="container" style="max-width:900px;margin:0 auto;padding:100px 24px 40px;">
    <a class="back" href="../index.html#catalog" style="display:inline-flex;align-items:center;gap:0.4rem;color:var(--text-mid);font-size:0.9rem;font-weight:500;margin-bottom:1.5rem;transition:var(--transition);">
      ← Volver al catálogo
    </a>

    <div class="product" style="display:grid;grid-template-columns:220px 1fr;gap:2.5rem;align-items:start;background:#fff;padding:2rem;border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1px solid #f4d0da;">
      <div style="display:flex;align-items:center;justify-content:center;">
        <div style="width:100%;aspect-ratio:1;border-radius:var(--radius-md);background:linear-gradient(135deg, #fde8ef, #f8d5e4);display:flex;align-items:center;justify-content:center;font-size:4rem;overflow:hidden;border:1px solid #f4c8d4;">
          📿
        </div>
      </div>

      <div>
        <span style="display:inline-block;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem;">Pulseras</span>
        <h1 style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--text-dark);margin-bottom:0.75rem;line-height:1.2;">Pulsera — La Llave del Amor</h1>
        <p style="color:var(--text-mid);line-height:1.6;margin-bottom:1rem;font-size:0.95rem;">Pulsera a juego para parejas. Materiales premium, cierre ajustable.</p>
        <p style="font-family:'Playfair Display',serif;font-weight:700;font-size:1.5rem;color:var(--rose-dark);margin-top:0.5rem;margin-bottom:1.5rem;" id="productPrice">$2.800</p>

        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
          <button
            class="btn-primary"
            onclick='addToCart({id:101,name:"Pulsera La Llave del Amor",price:2800,emoji:"📿",unit:"par",qty:1}); event.stopPropagation();'
            style="display:inline-flex;align-items:center;gap:0.4rem;"
          >Agregar al carrito</button>

          <button
            class="btn-outline"
            onclick="location.href='../index.html'"
            style="display:inline-flex;align-items:center;gap:0.4rem;"
          >Ver catálogo</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const el = document.getElementById('productPrice');
      if (el && typeof formatARS === 'function') {
        el.textContent = formatARS(2800);
      }
      updateCartBadge();
    });
  </script>
</body>
</html>
