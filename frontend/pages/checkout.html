<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finalizar compra | Artesanía Gualeguay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/checkout.css" />

  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="../index.html" class="logo">
          <span class="logo-dot" aria-hidden="true"></span>
          <span class="logo-text">Artesanía Gualeguay</span>
        </a>
      </div>
      <div class="navbar-actions">
        <a href="pages/cart.html" class="cart-link">
          <span class="cart-icon" aria-hidden="true">🛒</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="checkout-wrap">
    <div class="section-header section-header-spaced reveal">
      <span class="section-tag reveal">Checkout</span>
      <h1 class="section-title reveal">Finalizar compra</h1>
      <p class="section-subtitle reveal">Completá tus datos de envío antes de pagar</p>
    </div>

    <div id="emptyCart" class="empty-cart reveal" style="display:none;">
      <h2>Tu carrito está vacío</h2>
      <p>Agregá productos antes de continuar.</p>
      <a href="../index.html#catalog" class="btn-primary btn-block" style="margin-top:1rem;">Ver catálogo</a>
    </div>

    <div id="checkoutContent" class="checkout-grid">
      <div class="checkout-card reveal">
        <h2>📦 Datos de envío</h2>
        <form id="shippingForm">
          <div class="form-group">
            <label>Nombre completo *</label>
            <input type="text" id="shipName" required placeholder="Tu nombre" />
          </div>
          <div class="form-group">
            <label>Dirección *</label>
            <input type="text" id="shipAddress" required placeholder="Calle, número, piso, depto" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;" class="form-grid-2">
            <div class="form-group">
              <label>Código postal *</label>
              <input type="text" id="shipZip" required placeholder="3200" />
            </div>
            <div class="form-group">
              <label>Localidad / Ciudad *</label>
              <input type="text" id="shipCity" required placeholder="Gualeguay" />
            </div>
          </div>
          <div class="form-group">
            <label>Teléfono / Celular *</label>
            <input type="tel" id="shipPhone" required placeholder="+54 3444 123456" />
          </div>
          <div class="form-group">
            <label>Email (para el comprobante)</label>
            <input type="email" id="shipEmail" placeholder="tu@email.com" />
          </div>
          <button type="submit" class="btn-primary btn-full btn-block">Continuar al pago</button>
        </form>
      </div>

      <div class="checkout-card reveal">
        <h2>🧾 Resumen</h2>
        <div id="summaryItems"></div>
        <div id="summaryTotals" class="summary-spaced"></div>
        <p class="checkout-note">Al continuar, serás redirigido a MercadoPago para completar el pago de forma segura.</p>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/payment.js"></script>
  <script>
    function updateSummary() {
      const items = getCart();
      const container = document.getElementById('summaryItems');
      const totals = document.getElementById('summaryTotals');
      document.getElementById('emptyCart').style.display = items.length ? 'none' : 'block';
      document.getElementById('checkoutContent').style.display = items.length ? 'grid' : 'none';

      container.innerHTML = items.map(it => `
        <div class="item-row">
          <div class="item-thumb">${it.image ? `<img src="${it.image}" alt="" />` : (it.emoji || '📿')}</div>
          <div class="item-meta">
            <h4>${it.name}</h4>
            <p>Cantidad: ${it.qty}</p>
          </div>
          <div class="item-price">${formatARS(it.price * it.qty)}</div>
        </div>
      `).join('');

      const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
      const shipping = subtotal > CONFIG.CART.SHIPPING_THRESHOLD ? 0 : CONFIG.CART.SHIPPING_COST;
      const total = subtotal + shipping;

      totals.innerHTML = `
        <div class="summary-row"><span>Subtotal</span><span>${formatARS(subtotal)}</span></div>
        <div class="summary-row"><span>Envío</span><span>${shipping === 0 ? CONFIG.CART.FREE_SHIPPING_TEXT : formatARS(shipping)}</span></div>
        <div class="summary-row total"><span>Total</span><span>${formatARS(total)}</span></div>
      `;

      updateCartBadge();
    }

    document.getElementById('shippingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const items = getCart();
      if (!items.length) { showToast('', 'Carrito vacío', 'error'); return; }

      const shipping = {
        name: document.getElementById('shipName').value.trim(),
        address: document.getElementById('shipAddress').value.trim(),
        phone: document.getElementById('shipPhone').value.trim(),
        zip: document.getElementById('shipZip').value.trim(),
        city: document.getElementById('shipCity').value.trim(),
        email: document.getElementById('shipEmail').value.trim() || ''
      };

      if (!shipping.name || !shipping.address || !shipping.phone || !shipping.zip) {
        showToast('', 'Completá todos los campos obligatorios', 'error');
        return;
      }

      const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
      const shippingCost = subtotal > CONFIG.CART.SHIPPING_THRESHOLD ? 0 : CONFIG.CART.SHIPPING_COST;
      const total = subtotal + shippingCost;

      // Guardar orden (pending hasta que MP confirme)
      try {
        const orderRes = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            items: items.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty, emoji: i.emoji, image: i.image })),
            shipping_name: shipping.name,
            shipping_address: shipping.address,
            shipping_phone: shipping.phone,
            shipping_zip: shipping.zip,
            shipping_city: shipping.city,
            subtotal, shipping_cost: shippingCost, total
          })
        });
        const orderData = await orderRes.json();
        if (!orderRes.ok) throw new Error(orderData.error || 'Error guardando orden');

        const payer = { name: shipping.name, email: shipping.email || 'cliente@artesaniagualeguay.com' };
        const mpItems = items.map(i => ({
          title: i.name,
          unit_price: i.price,
          quantity: i.qty,
          currency_id: 'ARS',
          description: i.description || 'Producto de Artesanía Gualeguay'
        }));

        showToast('⏳', 'Procesando pago...');
        const prefRes = await fetch('/api/create-preference', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            items: mpItems,
            payer,
            external_reference: `AG-${orderData.id}`,
            back_urls: {
              success: `${window.location.origin}/pages/success.html`,
              failure: `${window.location.origin}/pages/cart.html`,
              pending: `${window.location.origin}/pages/cart.html`
            },
            auto_return: 'approved',
            shipment: { free_shipping: shippingCost === 0 }
          })
        });
        const prefData = await prefRes.json();
        if (prefData && prefData.init_point) {
          window.location.href = prefData.init_point;
        } else {
          showToast('', 'Error al generar el pago', 'error');
        }
      } catch (err) {
        showToast('', err.message, 'error');
      }
    });

    document.addEventListener('DOMContentLoaded', updateSummary);
    window.addEventListener('storage', updateSummary);
  </script>
</body>
</html>
